<!--
  priority-pill — STATIC + PARAMETRIZED. No logic.ts, so its single @input is *implied* from the
  free name its template reads: `priority` ('low'|'medium'|'high'|'urgent'). Showcases §6 @switch
  and a §2 [class.x] toggle driven by a comparison. Ships zero JS — pure SSR.
-->
<span class="pill" [class.pill--urgent]="priority === 'urgent'">
  @switch (priority) {
    @case ('urgent') {
      <span class="pill__dot pill__dot--urgent"></span>
      <span class="pill__label">Urgent</span>
    }
    @case ('high') {
      <span class="pill__dot pill__dot--high"></span>
      <span class="pill__label">High</span>
    }
    @case ('medium') {
      <span class="pill__dot pill__dot--medium"></span>
      <span class="pill__label">Medium</span>
    }
    @default {
      <span class="pill__dot pill__dot--low"></span>
      <span class="pill__label">Low</span>
    }
  }
</span>
