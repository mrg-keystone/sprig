<!--
  site-nav — STATIC component (no logic.ts): server-rendered markup, ships zero JS.
  Plain <a href> links only (no calls/events/bindings). Showcases §13 i18n (i18n="@@brand",
  i18n-title) + an inline <svg> logo mark beside the brand word, all inside a static component.
-->
<nav class="nav">
  <a class="nav__brand" href="/">
    <svg class="nav__logo" viewBox="0 0 24 24" role="img" aria-label="sprig logo" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 3 C7 8 7 14 12 21 C17 14 17 8 12 3 Z" />
      <path d="M12 9 L12 21" />
    </svg>
    <span class="nav__brand-text" i18n="@@brand">sprig</span>
  </a>
  <ul class="nav__links">
    <li><a href="/">Dashboard</a></li>
    <li><a href="/board">Board</a></li>
    <li><a href="/docs" i18n-title title="Read the documentation">Docs</a></li>
    <li><a href="/users/ada">Ada</a></li>
    <!-- named outlets are just part of the href — no special link API -->
    <li><a href="/settings/main=question/sidebar=admin/">Settings</a></li>
    <li><a href="/about">About</a></li>
    <li><a href="/welcome">Welcome</a></li>
  </ul>
</nav>
