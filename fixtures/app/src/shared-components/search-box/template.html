<!-- search-box island: [(ngModel)] two-way + enter/escape keys + #box ref + search output -->
<form class="search" (submit)="submit()">
  <input
    #box
    class="search__input"
    name="q"
    [(ngModel)]="q"
    (keyup.enter)="submit()"
    (keydown.escape)="clear()"
    placeholder="Search issues"
    [disabled]="false"
  />
  <button type="button" class="search__clear" (click)="clear()">Clear</button>
  <button type="button" class="search__focus" (click)="box.focus()">Focus</button>
  <button type="submit" class="search__go">Go</button>
</form>
