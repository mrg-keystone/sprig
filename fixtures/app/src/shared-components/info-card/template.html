<!--
  info-card — STATIC content-projection HOST (§10). No inputs, no expressions, zero JS.
  Three ng-content outlets: a [card-title] header slot, the default body slot, and a
  <card-actions> footer slot whose inner markup is FALLBACK content rendered only when the
  parent projects nothing into it.
-->
<div class="card">
  <header class="card__head">
    <ng-content select="[card-title]"></ng-content>
  </header>
  <div class="card__body">
    <ng-content></ng-content>
  </div>
  <footer class="card__foot">
    <ng-content select="card-actions">
      <button class="card__ok">OK</button>
    </ng-content>
  </footer>
</div>
