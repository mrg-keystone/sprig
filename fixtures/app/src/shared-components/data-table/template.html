<!-- data-table — ISLAND: legacy *ngFor/trackBy/locals + *ngSwitch* + *ngIf/else + *ngTemplateOutlet/ng-container/ng-template + [attr.colspan]. -->
<table class="dt"><thead><tr><th>ID</th><th>Title</th><th>Status</th><th>Pts</th></tr></thead>
<tbody>
  <tr *ngFor="let row of rows(); trackBy: trackById; let i = index; let even = even; let last = last" [class.dt--even]="even" [class.dt--last]="last">
    <td><ng-container *ngTemplateOutlet="idCell; context: { $implicit: row.id }"></ng-container></td>
    <td>{{ row.title }}</td>
    <td [ngSwitch]="row.status">
      <span *ngSwitchCase="'done'">✓ done</span>
      <span *ngSwitchCase="'in-progress'">… wip</span>
      <span *ngSwitchDefault>{{ row.status }}</span>
    </td>
    <td *ngIf="row.points; else noPoints">{{ row.points }}</td>
    <ng-template #noPoints><td>—</td></ng-template>
  </tr>
</tbody>
<tfoot><tr><td [attr.colspan]="4">{{ rows().length }} issues</td></tr></tfoot></table>
<ng-template #idCell let-value><code>{{ value }}</code></ng-template>
