<!--
  counter — ISLAND (has logic.ts). Bindings resolve against the scope returned by
  defineComponent() in logic.ts: signals are read as `name()`, methods called as `fn()`.
-->
<div class="counter">
  <button class="counter__btn" (click)="dec()" [disabled]="count() <= 0">−</button>
  <output class="counter__value">{{ count() }}</output>
  <button class="counter__btn" (click)="inc()">+</button>

  @if (count() >= 10) {
    <span class="counter__badge">🔥 on a roll</span>
  }
</div>
