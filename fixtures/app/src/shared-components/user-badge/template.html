<!--
  user-badge — STATIC but PARAMETRIZED. It has NO logic.ts, so its @inputs are *implied* from
  the free names its template reads: `name` and `bio`. It ships zero JS and renders purely from
  data a parent passes in. Run:  deno run -A scripts/implied-inputs.ts <this file>
  → { "inputs": ["bio", "name"], "requiresLogic": false }
-->
<div class="badge">
  <strong class="badge__name">{{ name }}</strong>
  @if (bio) {
    <p class="badge__bio">{{ bio }}</p>
  }
</div>
