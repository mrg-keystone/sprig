<!--
  shell layout — wraps every page. <router-outlet> marks the region the active route
  renders into. On client navigation only the outlet's contents are swapped (inside a view
  transition); <site-nav> and anything else here stays mounted and keeps its island state.
-->
<div class="shell">
  <header class="shell__bar">
    <site-nav></site-nav>
    <!-- island: reads the client-scoped Prefs store, persists nothing across the wire -->
    <theme-toggle></theme-toggle>
  </header>

  <main class="shell__main">
    <router-outlet></router-outlet>
  </main>

  <footer class="shell__footer">
    <small>Built with sprig — static HTML + selective island hydration.</small>
  </footer>

  <!-- island: a global toast queue (client Notify store). Stays mounted across soft-navs. -->
  <toast-host></toast-host>
</div>
