  this page's components/) and a shared island (<counter>). The page ships no JS of its own;
  each island hydrates independently.
-->
<section class="landing">
  <hero [headline]="'Build static-first, hydrate selectively'" name="sprig"></hero>

  <div class="landing__demo">
    <p>A live island, hydrated on interaction:</p>
    <counter></counter>
  </div>

  <p class="landing__cta">
    Read <a href="/about">about</a>, or open a <a href="/users/ada">user profile</a>.
  </p>
</section>
