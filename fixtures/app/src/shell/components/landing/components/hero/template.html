<!--
  hero — page-local ISLAND (only landing uses it, so it lives under landing/components/).
  Reads two @inputs (headline, name) and uses a "both"-scoped service via inject().
-->
<header class="hero">
  <h1 class="hero__title">{{ headline() }}</h1>
  <p class="hero__sub">Hello, {{ name() }} 👋</p>

  <button class="hero__toggle" (click)="toggle()">
    {{ open() ? 'Hide details' : 'Show details' }}
  </button>

  @if (open()) {
    <p class="hero__details">
      A component is a folder: <code>template.html</code> is the view; add
      <code>logic.ts</code> to make it an island; drop in <code>styles.css</code> for scoped CSS.
    </p>
  }
</header>
