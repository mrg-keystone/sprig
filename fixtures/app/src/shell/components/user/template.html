<!--
  user — ISLAND page bound to /users/:id. Shows @if … as aliasing, a @switch on the role,
  the keyvalue pipe over facts, and a legacy *ngFor/trackBy over the user's resolved issues.
-->
<section class="user">
  @if (user(); as u) {
    <!-- pass server-resolved data into a logic-less STATIC component (implied inputs) -->
    <user-badge [name]="u.name" [bio]="u.bio"></user-badge>

    @switch (u.role) {
      @case ('owner') {
        <span class="role role--owner">Owner</span>
      }
      @case ('maintainer') {
        <span class="role">Maintainer</span>
      }
      @default {
        <span class="role">Contributor</span>
      }
    }

    <dl class="user__facts">@for (f of u.facts | keyvalue; track f.key) {
      <dt>{{ f.key }}</dt><dd>{{ f.value }}</dd>
    }</dl>

    <ul class="user__issues">
      <li *ngFor="let issue of issues(); trackBy: trackIssue; let i = index">{{ i + 1 }}. {{ issue.id }} — {{ issue.title }}</li>
    </ul>
  } @else {
    <p class="user__missing">No user with id "{{ id() }}".</p>
  }

  <button class="user__back" (click)="back()">← back</button>
</section>
