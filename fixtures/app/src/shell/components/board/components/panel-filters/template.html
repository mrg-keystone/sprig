<!-- Island: filter panel — child search-box output, status toggles, apply emit -->
<aside class="filters">
  <h3 i18n="@@filters">Filters</h3>
  <search-box (search)="onSearch($event)"></search-box>
  <p class="filters__q">Query: {{ q() || 'none' }}</p>
  <fieldset class="filters__set">@for (s of allStatuses(); track s) {
    <label class="filters__opt" [ngClass]="{ active: has(s) }"><input type="checkbox" name="st" (change)="toggle(s)" [attr.value]="s" /> {{ s }}</label>
  }</fieldset>
  <button class="filters__apply" (click)="apply(q())" [disabled]="q() === ''">Apply</button>
</aside>
