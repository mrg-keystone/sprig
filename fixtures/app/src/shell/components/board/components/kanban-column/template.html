<!-- kanban-column: collapsible column; flags WIP overflow; renders issue-cards. -->
<section class="col" [class.col--over]="overWip()" [attr.aria-label]="column().label">
  <header class="col__head" (click)="toggle()">
    <h2 class="col__title">{{ column().label }}</h2>
    <span class="col__count" [class.col__count--over]="overWip()">{{ issues().length }}@if (column().wip) { <small>/{{ column().wip }}</small> }</span>
  </header>
  @if (collapsed() === false) {
    <ul class="col__list">@for (issue of issues(); track issue.id; let i = $index) {
      <li class="col__item"><issue-card [issue]="issue"></issue-card></li>
    } @empty { <li class="col__empty">No issues</li> }</ul>
  }
</section>
