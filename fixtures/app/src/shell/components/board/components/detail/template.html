<!-- detail island page: @if-as/@else, info-card projection (slots + fallback), ?? + $any, [innerHTML], [@fade] animation, i18n, and custom two-way [(value)] on star-rating -->
@if (issue(); as it) {
  <article class="detail" [@fade]="'in'">
    <info-card>
      <h3 card-title>{{ it.id }} · {{ it.title }}</h3>
      <priority-pill [priority]="it.priority"></priority-pill>
      <div class="detail__desc" [innerHTML]="it.descriptionHtml"></div>
      <p>Assignees</p>
      <avatar-stack [users]="assignees()"></avatar-stack>
      <p>Your rating: <star-rating [(value)]="rating" (rate)="onRate($event)"></star-rating></p>
      <p class="detail__meta">created {{ it.createdAt | date:'mediumDate' }} · {{ it.commentCount }} comments</p>
      <p class="detail__legacy">{{ $any(it).legacyField ?? 'no legacy field' }}</p>
      <card-actions><button class="detail__close" (click)="close()">Close</button></card-actions>
    </info-card>
  </article>
} @else {
  <p class="detail__missing" i18n="@@noIssue">No issue "{{ id() }}".</p>
}
