<!-- Island: profile form — §11 [ngClass]/[ngStyle]/[(ngModel)] + §4 #ctrl exportAs + §2 (submit)/(change)/[disabled]/[attr] + §6 @if/@for + child <star-rating>. -->
<form class="profile" (submit)="save()" [ngClass]="{ 'profile--saved': saved() }">
  <h3 i18n="@@profile">Your profile</h3>
  <label class="profile__row">Name <input name="name" #ctrl="ngModel" [(ngModel)]="name" [ngStyle]="{ 'border-color': name() === '' ? 'red' : '#ccc' }" /></label>
  @if (ctrl.invalid) { <small class="profile__err">required</small> }
  <fieldset class="profile__set">@for (d of densities(); track d) {
    <label [ngClass]="{ on: density() === d }"><input type="radio" name="density" (change)="setDensity(d)" [attr.checked]="density() === d ? '' : null" /> {{ d }}</label>
  }</fieldset>
  <label><input type="checkbox" name="notify" [(ngModel)]="notify" /> Email me</label>
  <p>Rate the app: <star-rating [(value)]="rating" (rate)="onRate($event)"></star-rating></p>
  <button type="submit" [disabled]="name() === ''">Save</button>
  @if (saved()) { <p class="profile__ok">Saved ✓</p> }
</form>
