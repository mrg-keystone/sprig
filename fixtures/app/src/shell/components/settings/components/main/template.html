<!--
  main=:topic target — STATIC + PARAMETRIZED. `topic` is an implied @input: it's the route
  param from the outlet value (`main=question` → topic = "question"), resolved on the server
  and passed in. No logic.ts needed.
-->
<article class="topic">
  <h2>{{ topic }}</h2>
  <p>Content for the "{{ topic }}" topic.</p>
</article>
