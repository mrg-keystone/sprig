<!-- kpi-tile: static parametrized KPI metric tile (label, value, unit, delta, tone). The tone
     keyword maps to the accent colour through the .kpi--<tone> class rules in styles.css (a
     keyword is not a valid CSS colour, so it must not be bound straight into a colour slot). -->
<article class="kpi" [class]="['kpi', 'kpi--' + tone]">
  <h3 class="kpi__label">{{ label }}</h3>
  <p class="kpi__value">{{ value | number:'1.0-0' }}<small class="kpi__unit">{{ unit }}</small></p>
  @if (delta) {
    <span class="kpi__delta" [class.kpi__delta--up]="delta > 0">{{ delta | percent:'1.0-1' }}</span>
  }
</article>
