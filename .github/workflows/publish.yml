name: Publish to JSR

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      # Version = <major>.<minor> from deno.json + the run number as the patch,
      # so every merge to main publishes a new version automatically.
      - name: Version + publish
        env:
          JSR_TOKEN: ${{ secrets.JSR_TOKEN }}
        run: |
          MAJMIN=$(jq -r '.version | split(".")[0:2] | join(".")' deno.json)
          jq --arg v "$MAJMIN.$GITHUB_RUN_NUMBER" '.version = $v' deno.json > d && mv d deno.json
          echo "Publishing $MAJMIN.$GITHUB_RUN_NUMBER"
          # When deno publish sees GITHUB_ACTIONS=true it enters the GitHub-OIDC
          # publish flow and blocks ~2h on an id-token verification that never comes
          # (we use token auth, not OIDC; no `id-token: write` is granted). Setting
          # GITHUB_ACTIONS=false for just this command makes deno take the plain token
          # path, which publishes in seconds. Verified in a container with `act`.
          GITHUB_ACTIONS=false deno publish --token "$JSR_TOKEN" --allow-slow-types --allow-dirty
