name: Publish to JSR

on:
  push:
    branches:
      - main

concurrency:
  group: jsr-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      # `deno publish` type-checks then uploads. Bump deno.json's version each
      # release — re-publishing an existing version fails.
      - name: Publish to JSR
        run: deno publish --token "$JSR_TOKEN" --allow-slow-types
        env:
          JSR_TOKEN: ${{ secrets.JSR_TOKEN }}
