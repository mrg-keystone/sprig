name: Publish to JSR

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      # Version = <major>.<minor> from deno.json + the run number as the patch,
      # so every merge to main publishes a new version automatically.
      - name: Version + publish
        env:
          JSR_TOKEN: ${{ secrets.JSR_TOKEN }}
        run: |
          MAJMIN=$(jq -r '.version | split(".")[0:2] | join(".")' deno.json)
          jq --arg v "$MAJMIN.$GITHUB_RUN_NUMBER" '.version = $v' deno.json > d && mv d deno.json
          echo "Publishing $MAJMIN.$GITHUB_RUN_NUMBER"
          # --no-provenance: in GitHub Actions, deno publish auto-attempts provenance
          # attestation, which needs a GitHub OIDC token (permissions: id-token: write).
          # Without it the step stalls ~2h before falling back. We publish with an
          # explicit JSR token and skip provenance so the publish is fast (~seconds).
          # To re-enable provenance later: add `permissions: id-token: write` to this
          # job and drop --no-provenance.
          deno publish --token "$JSR_TOKEN" --allow-slow-types --allow-dirty --no-provenance
