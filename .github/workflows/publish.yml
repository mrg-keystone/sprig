name: Publish to JSR

on:
  push:
    branches:
      - main

jobs:
  publish:
    uses: mrg-keystone/actions/.github/workflows/jsr-publish.yml@main
    permissions:
      contents: write # the workflow commits the version bump back
    secrets: inherit
    with:
      # No public API exports → no slow types; passing --allow-slow-types
      # makes JSR take its slow server-side publish path (skips .d.ts gen).
      allow-slow-types: false
