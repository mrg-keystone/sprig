name: Release

# On push to main, build the self-contained workspace bundle and publish it as the
# rolling `latest` GitHub release via the shared mrg-keystone/actions workflow.
#   main → rolling `latest` (the canonical install target)
# install.ts fetches releases/latest → the isolate-*.tar.gz asset; `isolate update`
# re-pulls the same. No per-push version tags (rolling model). pack-skills is off:
# the skills already ship inside the one bundle (install-core copies them out).

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build the self-contained workspace bundle
        run: |
          tar -czf isolate-latest.tar.gz \
            --exclude='node_modules' \
            --exclude='_fresh' \
            --exclude='test-results' \
            --exclude='.git' \
            deno.json deno.lock cli server ui skills
      - uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: isolate-latest.tar.gz

  release:
    needs: [build]
    permissions:
      contents: write
    uses: mrg-keystone/actions/.github/workflows/gh-release.yml@main
    with:
      artifact-pattern: release-*
      pack-skills: false
