# Build the "runtime-latest" GitHub release whose `sprig-runtime.tar.gz` asset is the SOURCE
# bundle the CLI runs from locally: framework/ (incl. the tree-sitter grammar.wasm) + packages/
# + skills/ + the isolate workbench (app/ + server/ + cli/ + serve.ts) + the workspace deno.json
# — but NO node_modules. `sprig install` / `sprig update` (framework/.sprig/install.ts) download
# it, extract to ~/.sprig, run `deno install` THERE to build every workspace member's
# node_modules on the machine, install the skills, and write the `sprig` launcher.
#
# LOCKSTEP WITH JSR: this runs on `workflow_run` AFTER publish.yml succeeds — NOT on `push`.
# publish.yml computes the next version from JSR, bumps deno.json, publishes to JSR, and commits
# the bump back to main. By the time it completes, main's tip carries that bump, so we check out
# main HEAD and bundle the EXACT version that just went to JSR. (On a `push` trigger we'd bundle
# the pre-bump tree and ship one release behind JSR forever.)
name: release-runtime
on:
  workflow_run:
    workflows: ["publish"]
    types: [completed]
permissions:
  contents: write
jobs:
  release-runtime:
    # Only after a successful JSR publish — so the runtime bundle's version == JSR's.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main # post-bump tip: includes publish.yml's `release: vX (auto-bump)` commit
          fetch-depth: 0
      - name: Resolve the version JSR just published
        id: ver
        run: |
          set -eu
          v=$(jq -r .version deno.json) # jq is preinstalled on ubuntu-latest (no deno on the runner)
          sha=$(git rev-parse HEAD)
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "Bundling runtime for v$v @ $sha"
      - name: Build the source runtime bundle (no node_modules)
        run: |
          set -eu
          rm -rf bundle && mkdir -p bundle
          # framework + packages + skills, PLUS the isolate workbench (app/server/cli/serve.ts)
          # so `sprig isolate` runs entirely from ~/.sprig. KEEP the workspace in deno.json so
          # `deno install` on the machine builds every member's (framework/cli/server/app)
          # node_modules — the members are present now, so the workspace resolves.
          cp -R framework packages skills app server cli bundle/
          cp serve.ts bundle/serve.ts
          cp serve-dev.ts bundle/serve-dev.ts
          cp deno.json bundle/deno.json
          # Stamp version + publish time into a sidecar inside the bundle so `sprig -v` can report
          # WHEN the installed version shipped — read locally, offline, authoritative for the exact
          # version on disk (the rolling runtime-latest GitHub timestamp can't say that). A sidecar,
          # NOT a deno.json key, because the launcher passes --config deno.json on every command and
          # an unknown key there could print a warning each run.
          published_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          jq -n \
            --arg v "${{ steps.ver.outputs.version }}" \
            --arg ts "$published_at" \
            --arg sha "${{ steps.ver.outputs.sha }}" \
            '{version:$v, publishedAt:$ts, commit:$sha}' > bundle/framework/.sprig/build-info.json
          echo "Stamped build-info.json: version=${{ steps.ver.outputs.version }} publishedAt=$published_at"
          tar -czf sprig-runtime.tar.gz -C bundle .
          echo "Bundle sanity (grammar.wasm + deno.json + serve.ts + app/ + server/ + build-info, NOT node_modules):"
          tar -tzf sprig-runtime.tar.gz | grep -E 'grammar\.wasm|^\./deno\.json$|^\./serve\.ts$|^\./app/src/|^\./server/src/|build-info\.json' | head
          if tar -tzf sprig-runtime.tar.gz | grep -q node_modules; then echo "ERROR: node_modules in bundle" >&2; exit 1; fi
          if ! tar -tzf sprig-runtime.tar.gz | grep -q 'framework/\.sprig/build-info\.json'; then echo "ERROR: build-info.json missing from bundle" >&2; exit 1; fi
      - name: Refresh the runtime-latest release with the bundle
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.ver.outputs.version }}
          SHA: ${{ steps.ver.outputs.sha }}
        run: |
          set -eu
          tag="runtime-latest"
          # Move the rolling tag to the bumped commit: drop the old release+tag, recreate it.
          # The notes carry `version: <v>` so `sprig -v` (latestRuntimeVersion) reads the shipped
          # version straight from the release — in lockstep with JSR by construction.
          gh release delete "$tag" --repo "${{ github.repository }}" --yes --cleanup-tag || true
          gh release create "$tag" sprig-runtime.tar.gz \
            --repo "${{ github.repository }}" \
            --target "$SHA" \
            --title "sprig runtime $VERSION" \
            --notes "version: $VERSION

          Source runtime bundle (framework + packages + skills + grammar.wasm + isolate workbench: app/server/cli/serve.ts) from $SHA. Installed by 'sprig install' / 'sprig update' → ~/.sprig (deno install runs on the machine). Lockstepped with the @sprig/core $VERSION release on JSR."
