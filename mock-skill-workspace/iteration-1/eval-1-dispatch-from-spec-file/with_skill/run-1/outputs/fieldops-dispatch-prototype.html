const INITIAL_JOBS = JSON.parse(JSON.stringify(JOBS)); // for demo reset
let view = 'queue';            // queue | board | eod
let queueSort = 'priority';    // priority | oldest
let openJobId = null;          // detail modal
let loading = false;
let fakeClock = 9.0;           // fake "now" for new timestamps

const PRIO_RANK = { emergency: 0, today: 1, scheduled: 2 };
const STATUS_FLOW = { assigned: 'en route', 'en route': 'on site' };
function now() { fakeClock += 0.07; const h = Math.floor(fakeClock); const m = String(Math.round((fakeClock - h) * 60)).padStart(2,'0'); return h + ':' + m + ' AM'; }
function tech(id) { return TECHS.find(t => t.id === id); }
function job(id) { return JOBS.find(j => j.id === id); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>

<!-- ============ HEADER / TABS ============ -->
<header class="bg-slate-900 text-white sticky top-0 z-30 shadow-lg">

    <nav id="tabs" class="flex gap-1"></nav>

<main id="main" class="max-w-screen-2xl mx-auto px-4 py-5"></main>

<div class="fixed bottom-4 right-4 z-30 bg-white border border-slate-300 rounded-xl shadow-xl p-3 w-56">

<script>
/* ============ shared bits ============ */
function prioBadge(p) {
  if (p === 'emergency') return '<span class="text-[11px] font-bold uppercase tracking-wide bg-red-600 text-white px-1.5 py-0.5 rounded">Emergency</span>';
  if (p === 'today')     return '<span class="text-[11px] font-bold uppercase tracking-wide bg-amber-400 text-amber-950 px-1.5 py-0.5 rounded">Today</span>';
  return '<span class="text-[11px] font-bold uppercase tracking-wide bg-slate-200 text-slate-600 px-1.5 py-0.5 rounded">Scheduled</span>';
}
function statusPill(s) {
  const map = { 'new':'bg-slate-200 text-slate-700', 'assigned':'bg-blue-100 text-blue-800', 'en route':'bg-indigo-100 text-indigo-800', 'on site':'bg-violet-100 text-violet-800', 'done':'bg-emerald-100 text-emerald-800', 'closed':'bg-slate-800 text-white' };
  return '<span class="text-xs font-semibold px-2 py-0.5 rounded-full ' + map[s] + '">' + s + '</span>';
}
function techStatusPill(s) {
  const map = { 'available':'bg-emerald-100 text-emerald-800', 'on job':'bg-violet-100 text-violet-800', 'driving':'bg-indigo-100 text-indigo-800', 'off':'bg-slate-200 text-slate-500' };
  return '<span class="text-[11px] font-semibold px-1.5 py-0.5 rounded-full ' + map[s] + '">' + s + '</span>';
}
const EQUIP_ICON = { furnace: '🔥', AC: '❄️', 'heat pump': '♻️', 'water heater': '🚿' };

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.remove('hidden');
  clearTimeout(t._tm); t._tm = setTimeout(() => t.classList.add('hidden'), 3200);
}

function assignJob(jobId, techId) {
  const j = job(jobId), t = tech(techId);
  if (!t) return;
  if (t.status === 'off') { toast(t.name + ' is off shift — can’t assign ' + jobId + '.'); render(); return; }
  j.assigned_tech = techId;
  if (j.status === 'new') { j.status = 'assigned'; j.history.push({ status: 'assigned', at: now() }); }
  render();
}

/* ============ TABS ============ */
function renderTabs() {
  const unassigned = JOBS.filter(j => j.status === 'new');
  const hasEmergency = unassigned.some(j => j.priority === 'emergency');
  const badge = unassigned.length
    ? '<span class="ml-1.5 text-xs font-bold px-1.5 py-0.5 rounded-full ' + (hasEmergency ? 'bg-red-600 text-white pulse-red' : 'bg-slate-600 text-white') + '">' + unassigned.length + '</span>'
    : '';
  const tabs = [ ['queue','Intake Queue' + badge], ['board','Dispatch Board'], ['eod','End of Day'] ];
  document.getElementById('tabs').innerHTML = tabs.map(([k, label]) =>
    '<button onclick="view=\'' + k + '\';render()" class="px-3 py-1.5 rounded-md text-sm font-medium ' +
    (view === k ? 'bg-white text-slate-900' : 'text-slate-300 hover:bg-slate-700') + '">' + label + '</button>'
  ).join('');
}

/* ============ SCREEN 1: INTAKE QUEUE ============ */
function renderQueue() {
  const list = JOBS.filter(j => j.status === 'new');
  list.sort((a, b) => queueSort === 'priority'
    ? (PRIO_RANK[a.priority] - PRIO_RANK[b.priority]) || a.created_at.localeCompare(b.created_at)
    : a.created_at.localeCompare(b.created_at));
  const emCount = list.filter(j => j.priority === 'emergency').length;

  let html = '<div class="flex items-center gap-3 mb-4">' +
    '<h2 class="text-xl font-bold">Intake Queue</h2>' +
    '<span class="text-sm text-slate-500">' + list.length + ' unassigned</span>' +
    '<div class="ml-auto flex items-center gap-2 text-sm">' +
      '<span class="text-slate-500">Sort:</span>' +
      '<button onclick="queueSort=\'priority\';render()" class="px-2 py-1 rounded ' + (queueSort==='priority'?'bg-slate-900 text-white':'bg-white border') + '">Priority</button>' +
      '<button onclick="queueSort=\'oldest\';render()" class="px-2 py-1 rounded ' + (queueSort==='oldest'?'bg-slate-900 text-white':'bg-white border') + '">Oldest first</button>' +
    '</div></div>';

  if (emCount) {
    html += '<div class="pulse-red bg-red-600 text-white rounded-lg px-4 py-3 mb-4 flex items-center gap-3 font-semibold">' +
      '<span class="text-xl">🚨</span> ' + emCount + ' EMERGENCY job' + (emCount>1?'s':'') + ' waiting unassigned — assign now.</div>';
  }

  if (!list.length) {
    html += '<div class="bg-white border-2 border-dashed border-slate-300 rounded-xl py-20 text-center">' +
      '<div class="text-5xl mb-3">🍃</div>' +
      '<div class="text-lg font-semibold text-slate-600">Queue is clear</div>' +
      '<div class="text-sm text-slate-400 mt-1">No unassigned jobs. New calls and web requests will land here.</div></div>';
  } else {
    html += '<div class="flex flex-col gap-2">' + list.map(j => {
      const emergency = j.priority === 'emergency';
      const opts = TECHS.map(t => '<option value="' + t.id + '">' + esc(t.name) + ' (' + t.zone + ', ' + t.status + ')' + '</option>').join('');
      return '<div draggable="true" ondragstart="dragJob(event,\'' + j.id + '\')" class="bg-white rounded-lg border ' +
        (emergency ? 'border-red-500 border-l-4 pulse-red' : 'border-slate-200 border-l-4 ' + (j.priority==='today'?'border-l-amber-400':'border-l-slate-300')) +
        ' px-4 py-3 flex items-center gap-4 cursor-grab hover:shadow-md">' +
        '<div class="min-w-0 flex-1 cursor-pointer" onclick="openDetail(\'' + j.id + '\')">' +
          '<div class="flex items-center gap-2 flex-wrap">' + prioBadge(j.priority) +
            '<span class="font-semibold truncate max-w-md" title="' + esc(j.customer) + '">' + esc(j.customer) + '</span>' +
            '<span class="text-xs text-slate-400 font-mono shrink-0">' + j.id + ' · ' + j.created_at + '</span></div>' +
          '<div class="text-sm text-slate-600 truncate mt-0.5">' + EQUIP_ICON[j.equipment] + ' ' + j.equipment + ' — ' + esc(j.issue) + '</div>' +
          '<div class="text-xs text-slate-400 truncate">' + esc(j.address) + ' · zone ' + j.zone + '</div></div>' +
        '<div class="shrink-0 flex items-center gap-2">' +
          '<select id="as_' + j.id + '" class="border rounded-md text-sm px-2 py-1.5 bg-slate-50"><option value="">Pick tech…</option>' + opts + '</select>' +
          '<button onclick="var s=document.getElementById(\'as_' + j.id + '\');if(s.value)assignJob(\'' + j.id + '\',s.value)" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold px-3 py-1.5 rounded-md">Assign</button>' +
        '</div></div>';
    }).join('') + '</div>' +
    '<p class="text-xs text-slate-400 mt-3">Tip: you can also drag a card onto a tech column on the Dispatch Board.</p>';
  }
  return html;
}

/* ============ SCREEN 2: DISPATCH BOARD ============ */
function renderBoard() {
  const unassigned = JOBS.filter(j => j.status === 'new');
  let html = '<div class="flex items-center gap-3 mb-4"><h2 class="text-xl font-bold">Dispatch Board</h2>' +
    '<span class="text-sm text-slate-500">drag cards between columns to (re)assign</span></div>';

  html += '<div class="flex gap-3 overflow-x-auto pb-4 items-start">';

  // unassigned lane
  html += '<div ondragover="event.preventDefault();this.classList.add(\'drag-over\')" ondragleave="this.classList.remove(\'drag-over\')" ondrop="dropUnassign(event,this)" class="bg-slate-200/70 rounded-xl p-3 w-64 shrink-0">' +
    '<div class="flex items-center justify-between mb-2"><span class="font-bold text-sm">Unassigned</span>' +
    (unassigned.some(j=>j.priority==='emergency') ? '<span class="pulse-red bg-red-600 text-white text-[11px] font-bold px-2 py-0.5 rounded-full">🚨 ' + unassigned.length + '</span>' : '<span class="text-xs text-slate-500">' + unassigned.length + '</span>') +
    '</div><div class="flex flex-col gap-2 min-h-[60px]">' +
    (unassigned.length ? unassigned.map(jobCard).join('') : '<div class="text-xs text-slate-400 text-center py-4">nothing waiting</div>') +
    '</div></div>';

  // tech columns
  html += TECHS.map(t => {
    const jobs = JOBS.filter(j => j.assigned_tech === t.id && j.status !== 'closed');
    const load = jobs.length;
    const off = t.status === 'off';
    return '<div ondragover="event.preventDefault();this.classList.add(\'drag-over\')" ondragleave="this.classList.remove(\'drag-over\')" ondrop="dropAssign(event,this,\'' + t.id + '\')" class="rounded-xl p-3 w-64 shrink-0 ' + (off ? 'bg-slate-100 opacity-60' : 'bg-white border border-slate-200 shadow-sm') + '">' +
      '<div class="mb-2">' +
        '<div class="flex items-center justify-between"><span class="font-bold text-sm truncate">' + esc(t.name) + '</span>' + techStatusPill(t.status) + '</div>' +
        '<div class="text-xs text-slate-500 mt-0.5">zone ' + t.zone + ' · ' + load + ' job' + (load===1?'':'s') + ' today</div>' +
      '</div><div class="flex flex-col gap-2 min-h-[60px]">' +
      (jobs.length ? jobs.map(jobCard).join('') : '<div class="text-xs text-slate-400 text-center py-4">' + (off ? 'off shift' : 'no jobs') + '</div>') +
      '</div></div>';
  }).join('');

  html += '</div>';
  return html;
}

function jobCard(j) {
  const emergency = j.priority === 'emergency';
  return '<div draggable="true" ondragstart="dragJob(event,\'' + j.id + '\')" onclick="openDetail(\'' + j.id + '\')" class="rounded-lg border px-3 py-2 cursor-pointer hover:shadow-md bg-white ' +
    (emergency ? 'border-red-500 border-l-4 bg-red-50' : 'border-slate-200 border-l-4 ' + (j.priority==='today'?'border-l-amber-400':'border-l-slate-300')) + '">' +
    '<div class="flex items-center gap-1.5">' + (emergency ? '<span class="text-red-600 text-xs font-bold">🚨</span>' : '') +
      '<span class="text-sm font-semibold truncate" title="' + esc(j.customer) + '">' + esc(j.customer) + '</span></div>' +
    '<div class="text-xs text-slate-500 truncate">' + EQUIP_ICON[j.equipment] + ' ' + j.equipment + ' · ' + esc(j.address) + '</div>' +
    '<div class="flex items-center justify-between mt-1.5">' + statusPill(j.status) + '<span class="text-[10px] text-slate-400 font-mono">' + j.id + '</span></div></div>';
}

function dragJob(ev, id) { ev.dataTransfer.setData('text/plain', id); }
function dropAssign(ev, el, techId) { ev.preventDefault(); el.classList.remove('drag-over'); assignJob(ev.dataTransfer.getData('text/plain'), techId); }
function dropUnassign(ev, el) {
  ev.preventDefault(); el.classList.remove('drag-over');
  const j = job(ev.dataTransfer.getData('text/plain'));
  if (!j) return;
  j.assigned_tech = null;
  if (j.status !== 'new') { j.status = 'new'; j.history.push({ status: 'new', at: now() + ' (bounced to queue)' }); }
  render();
}

/* ============ SCREEN 3: JOB DETAIL (modal) ============ */
function openDetail(id) { openJobId = id; renderDetail(); document.getElementById('modal').classList.remove('hidden'); }
function closeDetail() { openJobId = null; document.getElementById('modal').classList.add('hidden'); }

function renderDetail() {
  const j = job(openJobId); if (!j) return;
  const t = tech(j.assigned_tech);
  const emergency = j.priority === 'emergency';
  let html = '<div class="px-6 py-4 border-b flex items-start gap-3 ' + (emergency ? 'bg-red-600 text-white rounded-t-xl' : '') + '">' +
    '<div class="min-w-0"><div class="flex items-center gap-2 flex-wrap">' + (emergency ? '<span class="text-xl">🚨</span>' : '') +
      '<h3 class="text-lg font-bold break-words">' + esc(j.customer) + '</h3></div>' +
      '<div class="text-sm ' + (emergency ? 'text-red-100' : 'text-slate-500') + ' font-mono">' + j.id + ' · created ' + j.created_at + '</div></div>' +
    '<button onclick="closeDetail()" class="ml-auto text-2xl leading-none ' + (emergency ? 'text-white/80 hover:text-white' : 'text-slate-400 hover:text-slate-700') + '">&times;</button></div>';

  html += '<div class="px-6 py-4 grid grid-cols-2 gap-x-6 gap-y-3 text-sm">' +
    field('Priority', prioBadge(j.priority)) +
    field('Status', statusPill(j.status)) +
    field('Phone', esc(j.phone)) +
    field('Zone', j.zone + ' metro') +
    field('Equipment', EQUIP_ICON[j.equipment] + ' ' + j.equipment) +
    field('Assigned tech', t ? esc(t.name) + ' ' + techStatusPill(t.status) : '<span class="text-red-600 font-semibold">unassigned</span>') +
    '<div class="col-span-2">' + field('Address', '<span class="break-words">' + esc(j.address) + '</span>') + '</div>' +
    '<div class="col-span-2">' + field('Issue', '<span class="break-words">' + esc(j.issue) + '</span>') + '</div></div>';

  // status history
  html += '<div class="px-6 pb-4"><div class="text-xs font-bold uppercase tracking-wide text-slate-400 mb-2">Status history</div>' +
    '<div class="flex flex-col gap-1">' + j.history.map(h =>
      '<div class="flex items-center gap-2 text-sm"><span class="w-2 h-2 rounded-full bg-slate-400 shrink-0"></span>' + statusPill(h.status) + '<span class="text-slate-400 text-xs">' + h.at + '</span></div>'
    ).join('') + '</div></div>';

  // actions by status
  html += '<div class="px-6 py-4 border-t bg-slate-50 rounded-b-xl">';
  if (j.status === 'new') {
    const opts = TECHS.map(x => '<option value="' + x.id + '">' + esc(x.name) + ' (' + x.zone + ', ' + x.status + ')</option>').join('');
    html += '<div class="flex items-center gap-2"><select id="dt_assign" class="border rounded-md text-sm px-2 py-1.5 bg-white flex-1"><option value="">Assign to tech…</option>' + opts + '</select>' +
      '<button onclick="var s=document.getElementById(\'dt_assign\');if(s.value){assignJob(\'' + j.id + '\',s.value);renderDetail();}" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold px-4 py-1.5 rounded-md">Assign</button></div>';
  } else if (j.status === 'assigned' || j.status === 'en route') {
    const next = STATUS_FLOW[j.status];
    html += '<button onclick="advance(\'' + j.id + '\',\'' + next + '\')" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold px-4 py-2 rounded-md">Mark ' + next + ' →</button>' +
      '<span class="text-xs text-slate-400 ml-3">(simulates the tech’s phone update)</span>';
  } else if (j.status === 'on site') {
    html += '<div class="text-xs font-bold uppercase tracking-wide text-slate-400 mb-2">Tech close-out (simulated from tech’s phone)</div>' +
      '<div class="flex flex-col gap-2">' +
      '<textarea id="co_parts" rows="2" placeholder="Parts used (free text)" class="border rounded-md text-sm px-2 py-1.5 w-full">' + esc(j.parts_used) + '</textarea>' +
      '<div class="flex items-center gap-3 flex-wrap">' +
        '<input id="co_time" placeholder="Time on site, e.g. 1h 15m" value="' + esc(j.time_on_site) + '" class="border rounded-md text-sm px-2 py-1.5 w-44">' +
        '<label class="flex items-center gap-1.5 text-sm"><input id="co_fu" type="checkbox" ' + (j.needs_followup ? 'checked' : '') + '> needs follow-up</label>' +
        '<button onclick="submitCloseout(\'' + j.id + '\')" class="ml-auto bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-semibold px-4 py-2 rounded-md">Mark done ✓</button>' +
      '</div></div>';
  } else if (j.status === 'done') {
    html += '<div class="text-xs font-bold uppercase tracking-wide text-slate-400 mb-2">Close-out submitted — dispatcher review</div>' +
      '<div class="bg-white border rounded-lg p-3 text-sm mb-3">' +
        '<div><span class="text-slate-400">Parts used:</span> ' + (esc(j.parts_used) || '<i class="text-slate-400">none listed</i>') + '</div>' +
        '<div class="mt-1"><span class="text-slate-400">Time on site:</span> ' + (esc(j.time_on_site) || '<i class="text-slate-400">—</i>') +
        (j.needs_followup ? ' · <span class="text-amber-700 font-semibold">⚑ needs follow-up</span>' : '') + '</div></div>' +
      '<div class="flex gap-2">' +
        '<button onclick="closeJob(\'' + j.id + '\')" class="bg-slate-900 hover:bg-slate-700 text-white text-sm font-semibold px-4 py-2 rounded-md">Close job ✓</button>' +
        '<button onclick="bounceJob(\'' + j.id + '\')" class="bg-white border border-slate-300 hover:bg-slate-100 text-sm font-semibold px-4 py-2 rounded-md">Bounce back to tech</button></div>';
  } else { // closed
    html += '<div class="text-sm text-slate-500">✅ Job closed.' +
      ' Parts: ' + (esc(j.parts_used) || '—') + ' · Time on site: ' + (esc(j.time_on_site) || '—') +
      (j.needs_followup ? ' · <span class="text-amber-700 font-semibold">⚑ follow-up created</span>' : '') + '</div>';
  }
  html += '</div>';

  document.getElementById('modalCard').innerHTML = html;
}
function field(label, val) {
  return '<div><div class="text-xs font-bold uppercase tracking-wide text-slate-400">' + label + '</div><div class="mt-0.5">' + val + '</div></div>';
}
function advance(id, next) { const j = job(id); j.status = next; j.history.push({ status: next, at: now() }); render(); renderDetail(); }
function submitCloseout(id) {
  const j = job(id);
  j.parts_used = document.getElementById('co_parts').value;
  j.time_on_site = document.getElementById('co_time').value;
  j.needs_followup = document.getElementById('co_fu').checked;
  j.status = 'done'; j.history.push({ status: 'done', at: now() });
  render(); renderDetail();
}
function closeJob(id) { const j = job(id); j.status = 'closed'; j.history.push({ status: 'closed', at: now() }); render(); renderDetail(); }
function bounceJob(id) { const j = job(id); j.status = 'on site'; j.history.push({ status: 'on site', at: now() + ' (bounced back by dispatcher)' }); render(); renderDetail(); }

/* ============ SCREEN 4: END OF DAY SUMMARY ============ */
function renderEOD() {
  const closed = JOBS.filter(j => j.status === 'closed');
  const awaiting = JOBS.filter(j => j.status === 'done');
  const open = JOBS.filter(j => !['closed'].includes(j.status));
  const emergenciesHandled = JOBS.filter(j => j.priority === 'emergency' && (j.status === 'closed' || j.status === 'done')).length;
  const emergenciesOpen = JOBS.filter(j => j.priority === 'emergency' && !['closed','done'].includes(j.status)).length;
  const followups = JOBS.filter(j => j.needs_followup && (j.status === 'closed' || j.status === 'done'));

  let html = '<h2 class="text-xl font-bold mb-4">End-of-Day Summary <span class="text-sm text-slate-400 font-normal">— Tuesday</span></h2>';

  html += '<div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">' +
    stat(closed.length, 'jobs closed', 'bg-slate-900 text-white') +
    stat(emergenciesHandled, 'emergencies handled', emergenciesOpen ? 'bg-red-600 text-white' : 'bg-emerald-600 text-white') +
    stat(followups.length, 'follow-ups created', 'bg-amber-400 text-amber-950') +
    stat(open.length, 'still open', 'bg-white border border-slate-200') +
  '</div>';

  if (emergenciesOpen) {
    html += '<div class="pulse-red bg-red-600 text-white rounded-lg px-4 py-3 mb-5 font-semibold">🚨 ' + emergenciesOpen + ' emergency job' + (emergenciesOpen>1?'s':'') + ' still open — do not go home yet.</div>';
  }

  html += '<div class="grid md:grid-cols-2 gap-5">';

  // closed list
  html += '<div class="bg-white rounded-xl border border-slate-200 p-4"><div class="font-bold mb-3">✅ Closed today</div>' +
    (closed.length ? '<div class="flex flex-col gap-2">' + closed.map(j =>
      '<div onclick="openDetail(\'' + j.id + '\')" class="flex items-center gap-2 text-sm border-b last:border-0 pb-2 last:pb-0 cursor-pointer hover:bg-slate-50 rounded px-1">' +
      prioBadge(j.priority) + '<span class="font-medium truncate">' + esc(j.customer) + '</span>' +
      '<span class="ml-auto text-xs text-slate-400 shrink-0">' + (tech(j.assigned_tech)?.name || '—') + ' · ' + (j.time_on_site || '—') + '</span></div>'
    ).join('') + '</div>' : '<div class="text-sm text-slate-400 py-6 text-center">Nothing closed yet.</div>') + '</div>';

  // follow-ups + awaiting review
  html += '<div class="flex flex-col gap-5">' +
    '<div class="bg-white rounded-xl border border-slate-200 p-4"><div class="font-bold mb-3">⚑ Follow-ups created</div>' +
    (followups.length ? '<div class="flex flex-col gap-2">' + followups.map(j =>
      '<div onclick="openDetail(\'' + j.id + '\')" class="text-sm cursor-pointer hover:bg-slate-50 rounded px-1"><span class="font-medium">' + esc(j.customer) + '</span>' +
      '<span class="text-slate-400"> — ' + esc(j.parts_used || j.issue) + '</span></div>'
    ).join('') + '</div>' : '<div class="text-sm text-slate-400 py-4 text-center">No follow-ups today.</div>') + '</div>' +

    '<div class="bg-white rounded-xl border border-slate-200 p-4"><div class="font-bold mb-3">🕐 Done — awaiting dispatcher review</div>' +
    (awaiting.length ? '<div class="flex flex-col gap-2">' + awaiting.map(j =>
      '<div onclick="openDetail(\'' + j.id + '\')" class="flex items-center gap-2 text-sm cursor-pointer hover:bg-slate-50 rounded px-1">' +
      prioBadge(j.priority) + '<span class="font-medium truncate">' + esc(j.customer) + '</span>' +
      '<span class="ml-auto text-xs text-blue-600 font-semibold shrink-0">review →</span></div>'
    ).join('') + '</div>' : '<div class="text-sm text-slate-400 py-4 text-center">Review queue is clear.</div>') + '</div>' +
  '</div></div>';

  // per-tech
  html += '<div class="bg-white rounded-xl border border-slate-200 p-4 mt-5"><div class="font-bold mb-3">Techs</div>' +
    '<div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3">' + TECHS.map(t => {
      const doneCt = JOBS.filter(j => j.assigned_tech === t.id && (j.status === 'closed' || j.status === 'done')).length;
      const openCt = JOBS.filter(j => j.assigned_tech === t.id && !['closed','done'].includes(j.status)).length;
      return '<div class="border rounded-lg p-2.5"><div class="font-semibold text-sm truncate">' + esc(t.name) + '</div>' +
        '<div class="mt-1">' + techStatusPill(t.status) + '</div>' +
        '<div class="text-xs text-slate-500 mt-1.5">' + doneCt + ' done · ' + openCt + ' open</div></div>';
    }).join('') + '</div></div>';

  return html;
}
function stat(n, label, cls) {
  return '<div class="rounded-xl p-4 ' + cls + '"><div class="text-3xl font-bold">' + n + '</div><div class="text-sm opacity-80">' + label + '</div></div>';
}

/* ============ demo states ============ */
function demoEmpty() { JOBS = JOBS.filter(j => j.status !== 'new'); view = 'queue'; render(); }
function demoLoading() {
  loading = true; render();
  setTimeout(() => { loading = false; render(); }, 1200);
}
function demoReset() { JOBS = JSON.parse(JSON.stringify(INITIAL_JOBS)); closeDetail(); render(); toast.dismiss; document.getElementById('toast').classList.add('hidden'); render(); }

/* ============ root render ============ */
function render() {
  renderTabs();
  const main = document.getElementById('main');
  if (loading) {
    main.innerHTML = '<div class="flex flex-col gap-3 mt-2">' +
      '<div class="skeleton h-8 w-64 rounded-lg"></div>' +
      '<div class="skeleton h-20 rounded-xl"></div><div class="skeleton h-20 rounded-xl"></div><div class="skeleton h-20 rounded-xl"></div>' +
      '<div class="text-sm text-slate-400 text-center mt-2">Loading board…</div></div>';
    return;
  }
  main.innerHTML = view === 'queue' ? renderQueue() : view === 'board' ? renderBoard() : renderEOD();
}
render();
</script>
</body>
</html>
