<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Ledger — Invoicing</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Albert+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Albert Sans', system-ui, sans-serif; }
  h1, h2, h3 { font-family: 'Sora', 'Albert Sans', system-ui, sans-serif; letter-spacing: -0.01em; }
  .tnum { font-variant-numeric: tabular-nums; }
  @keyframes shimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
  .skeleton { background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%); background-size: 800px 100%; animation: shimmer 1.2s infinite linear; }
  @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
  .drawer-in { animation: slideIn .22s ease-out; }
  @keyframes toastIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  .toast-in { animation: toastIn .18s ease-out; }
  @keyframes popIn { from { opacity: 0; transform: scale(.97); } to { opacity: 1; transform: scale(1); } }
  .pop-in { animation: popIn .15s ease-out; }
</style>
</head>
<body class="bg-slate-100 text-slate-900 min-h-screen">

<script>
/* ============================================================
   ALL DATA LIVES HERE — hardcoded, mutated in memory only.
   Today is treated as 2026-06-12.
   ============================================================ */
const TODAY = '2026-06-12';

const SEED_INVOICES = [
  { id: 'INV-0041', client: 'Maple & Co.', project: 'Brand identity refresh', status: 'paid',
    issued: '2025-11-04', due: '2025-11-18', paidOn: '2025-11-15',
    items: [ { desc: 'Logo exploration (3 routes)', qty: 1, rate: 1800 }, { desc: 'Final logo + usage guide', qty: 1, rate: 1400 } ] },
  { id: 'INV-0042', client: 'Harbor Coffee Roasters', project: 'Packaging system — retail bags', status: 'paid',
    issued: '2025-12-02', due: '2025-12-16', paidOn: '2025-12-20',
    items: [ { desc: 'Packaging concepts', qty: 1, rate: 2200 }, { desc: 'Dieline production (4 SKUs)', qty: 4, rate: 350 } ] },
  { id: 'INV-0043', client: 'Northwind Yoga', project: 'Website redesign — 5 pages', status: 'paid',
    issued: '2026-01-08', due: '2026-01-22', paidOn: '2026-01-21',
    items: [ { desc: 'UX wireframes', qty: 1, rate: 1200 }, { desc: 'Visual design, 5 pages', qty: 5, rate: 520 } ] },
  { id: 'INV-0044', client: 'Maple & Co.', project: 'Spring campaign social kit', status: 'paid',
    issued: '2026-02-10', due: '2026-02-24', paidOn: '2026-02-23',
    items: [ { desc: 'Template set (12 posts)', qty: 12, rate: 95 }, { desc: 'Art direction day', qty: 1, rate: 850 } ] },
  { id: 'INV-0045', client: 'Pinecrest Realty', project: 'Listing brochure templates', status: 'paid',
    issued: '2026-03-03', due: '2026-03-17', paidOn: '2026-03-30',
    items: [ { desc: 'Brochure system (A4 + trifold)', qty: 1, rate: 1650 } ] },
  { id: 'INV-0046', client: 'Bluegrass Brewing', project: 'Label illustration — seasonal IPA', status: 'paid',
    issued: '2026-04-06', due: '2026-04-20', paidOn: '2026-04-18',
    items: [ { desc: 'Label illustration', qty: 1, rate: 1900 }, { desc: 'Print-ready production', qty: 1, rate: 400 } ] },
  { id: 'INV-0047', client: 'Harbor Coffee Roasters', project: 'Café menu + signage', status: 'paid',
    issued: '2026-05-01', due: '2026-05-15', paidOn: '2026-05-12',
    items: [ { desc: 'Menu design (print + board)', qty: 1, rate: 1300 }, { desc: 'Window vinyl artwork', qty: 1, rate: 700 } ] },
  { id: 'INV-0048', client: 'Northwind Yoga', project: 'Class schedule poster series', status: 'overdue',
    issued: '2026-05-08', due: '2026-05-22', paidOn: null,
    items: [ { desc: 'Poster series (3 designs)', qty: 3, rate: 480 } ] },
  { id: 'INV-0049', client: 'Juniper Skincare', project: 'E-commerce product page design', status: 'sent',
    issued: '2026-06-01', due: '2026-06-15', paidOn: null,
    items: [ { desc: 'Product page template', qty: 1, rate: 1750 }, { desc: 'Mobile adaptation', qty: 1, rate: 600 } ] },
  { id: 'INV-0050', client: 'Pinecrest Realty', project: 'Open-house signage refresh', status: 'sent',
    issued: '2026-06-09', due: '2026-06-23', paidOn: null,
    items: [ { desc: 'Signage system update', qty: 1, rate: 980 } ] },
  { id: 'INV-0051', client: 'Bluegrass Brewing', project: 'Taproom mural concept', status: 'draft',
    issued: '2026-06-11', due: '2026-06-25', paidOn: null,
    items: [ { desc: 'Mural concept boards', qty: 2, rate: 650 } ] },
];

// The deliberately-overflowing invoice (seeded from the demo panel).
const OVERFLOW_INVOICE = {
  id: 'INV-0099',
  client: 'The International Consortium for the Preservation of Extremely Long Corporate Naming Conventions & Affiliated Subsidiaries Worldwide Holdings LLC',
  project: 'Comprehensive multi-phase omnichannel brand ecosystem redesign including but not limited to primary and secondary logotype systems, a 240-page brand guidelines compendium, full stationery suite, vehicle livery for a fleet of 312 vans, trade-show booth environments, and bespoke iconography for eleven regional sub-brands across four continents',
  status: 'sent', issued: '2026-06-10', due: '2026-06-24', paidOn: null,
  items: [ { desc: 'Phase 1 — discovery, audit and stakeholder interviews across all eleven regional sub-brand teams', qty: 1, rate: 1248932775.50 } ],
};

/* ---------------- in-memory state ---------------- */
let state = {
  invoices: JSON.parse(JSON.stringify(SEED_INVOICES)),
  filter: 'all',          // all | draft | sent | overdue | paid
  drawerId: null,         // open invoice id
  modalOpen: false,
  loading: false,
  nextNumber: 52,
};

const fmt = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' });
const invTotal = inv => inv.items.reduce((s, it) => s + it.qty * it.rate, 0);
const fmtDate = d => { if (!d) return '—'; const [y,m,day] = d.split('-'); return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m-1] + ' ' + (+day) + ', ' + y; };

const STATUS_BADGE = {
  draft:   'bg-slate-200 text-slate-700',
  sent:    'bg-blue-100 text-blue-800',
  overdue: 'bg-rose-100 text-rose-700',
  paid:    'bg-emerald-100 text-emerald-800',
};
const STATUS_LABEL = { draft: 'Draft', sent: 'Sent', overdue: 'Overdue', paid: 'Paid' };
</script>

<!-- ============================ HEADER ============================ -->
<header class="bg-white border-b border-slate-200">
  <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-xl bg-indigo-600 flex items-center justify-center text-white font-extrabold text-lg">S</div>
      <div>
        <h1 class="text-lg font-bold leading-tight">Studio Ledger</h1>
        <p class="text-xs text-slate-500 leading-tight">Rafa Castro · Freelance Design</p>
      </div>
    </div>
    <button onclick="openModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold px-4 py-2.5 rounded-lg shadow-sm flex items-center gap-2">
      <span class="text-base leading-none">＋</span> New invoice
    </button>
  </div>
</header>

<main class="max-w-6xl mx-auto px-6 py-6 pb-32">

  <!-- ============================ STAT CARDS ============================ -->
  <div id="stats" class="grid grid-cols-1 sm:grid-cols-3 gap-4"></div>

  <!-- ============================ REVENUE CHART ============================ -->
  <section class="mt-6 bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
    <div class="flex items-baseline justify-between mb-1">
      <h2 class="font-bold text-slate-900">Monthly revenue</h2>
      <span class="text-xs text-slate-500">collected payments · last 8 months</span>
    </div>
    <div id="chart"></div>
  </section>

  <!-- ============================ INVOICE LIST ============================ -->
  <section class="mt-6 bg-white rounded-2xl border border-slate-200 shadow-sm">
    <div class="px-6 pt-5 pb-3 flex flex-wrap items-center justify-between gap-3">
      <h2 class="font-bold text-slate-900">Invoices</h2>
      <div id="tabs" class="flex gap-1 bg-slate-100 rounded-lg p-1"></div>
    </div>
    <div id="invoice-list"></div>
  </section>
</main>

<!-- ============================ TOASTS ============================ -->
<div id="toasts" class="fixed top-5 right-5 z-50 flex flex-col gap-2 w-80"></div>

<!-- ============================ DRAWER + MODAL MOUNTS ============================ -->
<div id="drawer-mount"></div>
<div id="modal-mount"></div>

<!-- ============================ DEMO STATES PANEL ============================ -->
<div class="fixed bottom-5 left-5 z-40 bg-slate-900 text-white rounded-xl shadow-xl p-3 w-56">
  <p class="text-[11px] font-bold uppercase tracking-wider text-slate-400 mb-2">Demo states</p>
  <div class="grid grid-cols-2 gap-1.5 text-xs font-medium">
    <button onclick="demoEmpty()" class="bg-slate-700 hover:bg-slate-600 rounded-md px-2 py-1.5">Empty</button>
    <button onclick="demoLoading()" class="bg-slate-700 hover:bg-slate-600 rounded-md px-2 py-1.5">Loading</button>
    <button onclick="demoError()" class="bg-slate-700 hover:bg-slate-600 rounded-md px-2 py-1.5">Error toast</button>
    <button onclick="demoOverflow()" class="bg-slate-700 hover:bg-slate-600 rounded-md px-2 py-1.5">Overflow</button>
    <button onclick="demoReset()" class="col-span-2 bg-indigo-600 hover:bg-indigo-500 rounded-md px-2 py-1.5">Reset data</button>
  </div>
</div>

<script>
/* ============================================================
   RENDER — redraw everything from state. Throwaway code:
   each section spelled out inline on purpose.
   ============================================================ */
function render() {
  renderStats();
  renderChart();
  renderTabs();
  renderList();
  renderDrawer();
}

/* ---------------- stat cards ---------------- */
function renderStats() {
  const inv = state.invoices;
  const outstanding = inv.filter(i => i.status === 'sent' || i.status === 'overdue').reduce((s,i) => s + invTotal(i), 0);
  const overdue = inv.filter(i => i.status === 'overdue');
  const overdueSum = overdue.reduce((s,i) => s + invTotal(i), 0);
  const paidJune = inv.filter(i => i.status === 'paid' && i.paidOn && i.paidOn.startsWith('2026-06')).reduce((s,i) => s + invTotal(i), 0);

  document.getElementById('stats').innerHTML = `
    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5">
      <p class="text-xs font-semibold uppercase tracking-wider text-slate-500">Outstanding</p>
      <p class="tnum text-2xl font-extrabold mt-1 truncate">${fmt.format(outstanding)}</p>
      <p class="text-xs text-slate-500 mt-1">${inv.filter(i => i.status==='sent'||i.status==='overdue').length} unpaid invoice(s)</p>
    </div>
    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5">
      <p class="text-xs font-semibold uppercase tracking-wider text-slate-500">Overdue</p>
      <p class="tnum text-2xl font-extrabold mt-1 truncate ${overdueSum > 0 ? 'text-rose-600' : ''}">${fmt.format(overdueSum)}</p>
      <p class="text-xs text-slate-500 mt-1">${overdue.length === 0 ? 'Nothing overdue 🎉' : overdue.length + ' invoice(s) past due'}</p>
    </div>
    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5">
      <p class="text-xs font-semibold uppercase tracking-wider text-slate-500">Collected in June</p>
      <p class="tnum text-2xl font-extrabold mt-1 truncate text-emerald-700">${fmt.format(paidJune)}</p>
      <p class="text-xs text-slate-500 mt-1">as of ${fmtDate(TODAY)}</p>
    </div>`;
}

/* ---------------- revenue bar chart (hand-rolled SVG) ---------------- */
function renderChart() {
  const months = ['2025-11','2025-12','2026-01','2026-02','2026-03','2026-04','2026-05','2026-06'];
  const labels = ['Nov','Dec','Jan','Feb','Mar','Apr','May','Jun'];
  const sums = months.map(m => state.invoices
    .filter(i => i.status === 'paid' && i.paidOn && i.paidOn.startsWith(m))
    .reduce((s,i) => s + invTotal(i), 0));
  const max = Math.max(...sums, 1);

  if (state.loading) {
    document.getElementById('chart').innerHTML = `<div class="skeleton h-48 rounded-xl mt-3"></div>`;
    return;
  }

  const W = 760, H = 210, padB = 26, padT = 24;
  const bw = 56, gap = (W - bw * 8) / 9;
  let bars = '';
  sums.forEach((v, i) => {
    const h = Math.round((v / max) * (H - padB - padT));
    const x = gap + i * (bw + gap);
    const y = H - padB - h;
    const isNow = months[i] === '2026-06';
    bars += `
      <rect x="${x}" y="${y}" width="${bw}" height="${Math.max(h,2)}" rx="6"
        fill="${isNow ? '#4f46e5' : '#c7d2fe'}"></rect>
      <text x="${x + bw/2}" y="${y - 7}" text-anchor="middle" font-size="11" font-weight="600"
        fill="${isNow ? '#312e81' : '#64748b'}" class="tnum">${v >= 1000 ? '$' + (v/1000).toFixed(1).replace(/[.]0$/,'') + 'k' : (v > 0 ? '$' + v : '')}</text>
      <text x="${x + bw/2}" y="${H - 8}" text-anchor="middle" font-size="11"
        fill="${isNow ? '#312e81' : '#94a3b8'}" font-weight="${isNow ? '700' : '500'}">${labels[i]}</text>`;
  });
  document.getElementById('chart').innerHTML = `
    <svg viewBox="0 0 ${W} ${H}" class="w-full mt-2" role="img">
      <line x1="0" y1="${H-padB}" x2="${W}" y2="${H-padB}" stroke="#e2e8f0" stroke-width="1"/>
      ${bars}
    </svg>`;
}

/* ---------------- filter tabs ---------------- */
function renderTabs() {
  const counts = { all: state.invoices.length };
  ['draft','sent','overdue','paid'].forEach(s => counts[s] = state.invoices.filter(i => i.status === s).length);
  document.getElementById('tabs').innerHTML = ['all','draft','sent','overdue','paid'].map(f => `
    <button onclick="setFilter('${f}')"
      class="px-3 py-1.5 rounded-md text-xs font-semibold ${state.filter === f ? 'bg-white shadow text-slate-900' : 'text-slate-500 hover:text-slate-800'}">
      ${f === 'all' ? 'All' : STATUS_LABEL[f]} <span class="tnum ${state.filter === f ? 'text-indigo-600' : 'text-slate-400'}">${counts[f]}</span>
    </button>`).join('');
}
function setFilter(f) { state.filter = f; render(); }

/* ---------------- invoice table ---------------- */
function renderList() {
  const mount = document.getElementById('invoice-list');

  if (state.loading) {
    mount.innerHTML = `<div class="px-6 pb-6 space-y-3 pt-2">` +
      Array(5).fill(`<div class="skeleton h-12 rounded-lg"></div>`).join('') + `</div>`;
    return;
  }

  const rows = state.invoices.filter(i => state.filter === 'all' || i.status === state.filter)
    .slice().sort((a,b) => b.issued.localeCompare(a.issued));

  if (state.invoices.length === 0) {
    mount.innerHTML = `
      <div class="py-16 text-center px-6">
        <svg class="mx-auto w-16 h-16 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6M7 3h7l5 5v11a2 2 0 01-2 2H7a2 2 0 01-2-2V5a2 2 0 012-2z"/>
        </svg>
        <h3 class="mt-4 font-bold text-slate-800">No invoices yet</h3>
        <p class="text-sm text-slate-500 mt-1">Create your first invoice and it'll show up here.</p>
        <button onclick="openModal()" class="mt-4 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold px-4 py-2 rounded-lg">＋ New invoice</button>
      </div>`;
    return;
  }
  if (rows.length === 0) {
    mount.innerHTML = `<div class="py-12 text-center text-sm text-slate-500">No ${STATUS_LABEL[state.filter].toLowerCase()} invoices right now.</div>`;
    return;
  }

  mount.innerHTML = `
    <div class="overflow-x-auto">
    <table class="w-full text-sm table-fixed min-w-[640px]">
      <thead>
        <tr class="text-left text-xs text-slate-500 uppercase tracking-wider border-y border-slate-100 bg-slate-50/60">
          <th class="px-6 py-2.5 font-semibold w-24">Invoice</th>
          <th class="px-3 py-2.5 font-semibold">Client / Project</th>
          <th class="px-3 py-2.5 font-semibold w-28">Due</th>
          <th class="px-3 py-2.5 font-semibold w-32 text-right">Amount</th>
          <th class="px-3 py-2.5 font-semibold w-24">Status</th>
          <th class="px-6 py-2.5 w-32"></th>
        </tr>
      </thead>
      <tbody>` +
    rows.map(inv => `
        <tr class="border-b border-slate-100 hover:bg-indigo-50/40 cursor-pointer" onclick="openDrawer('${inv.id}')">
          <td class="px-6 py-3.5 font-semibold text-slate-700 tnum">${inv.id}</td>
          <td class="px-3 py-3.5 overflow-hidden">
            <p class="font-semibold text-slate-900 truncate">${inv.client}</p>
            <p class="text-xs text-slate-500 truncate">${inv.project}</p>
          </td>
          <td class="px-3 py-3.5 text-slate-600 whitespace-nowrap ${inv.status === 'overdue' ? 'text-rose-600 font-semibold' : ''}">${fmtDate(inv.due)}</td>
          <td class="px-3 py-3.5 text-right font-bold tnum truncate">${fmt.format(invTotal(inv))}</td>
          <td class="px-3 py-3.5"><span class="inline-block text-[11px] font-bold px-2 py-0.5 rounded-full ${STATUS_BADGE[inv.status]}">${STATUS_LABEL[inv.status]}</span></td>
          <td class="px-6 py-3.5 text-right">
            ${inv.status === 'sent' || inv.status === 'overdue'
              ? `<button onclick="event.stopPropagation(); markPaid('${inv.id}')" class="text-xs font-bold text-emerald-700 bg-emerald-50 hover:bg-emerald-100 border border-emerald-200 rounded-lg px-2.5 py-1.5 whitespace-nowrap">✓ Mark paid</button>`
              : `<span class="text-xs text-slate-400">View →</span>`}
          </td>
        </tr>`).join('') + `
      </tbody>
    </table>
    </div>`;
}

/* ============================================================
   ACTIONS — all fake, in-memory
   ============================================================ */
function markPaid(id) {
  const inv = state.invoices.find(i => i.id === id);
  if (!inv) return;
  inv.status = 'paid';
  inv.paidOn = TODAY;
  toast('success', `${inv.id} marked paid — ${fmt.format(invTotal(inv))} added to June revenue.`);
  render();
}

function sendReminder(id) {
  toast('success', `Payment reminder sent for ${id}.`);
}

function downloadPdf(id) {
  // Deliberate failure path — this is the error state demo.
  toast('error', `PDF export failed for ${id}. The export service didn't respond (demo error).`);
}

/* ---------------- toasts ---------------- */
function toast(kind, msg) {
  const el = document.createElement('div');
  el.className = `toast-in rounded-xl shadow-lg border px-4 py-3 text-sm font-medium flex gap-2.5 items-start bg-white ` +
    (kind === 'error' ? 'border-rose-200 text-rose-800' : 'border-emerald-200 text-emerald-900');
  el.innerHTML = `<span class="${kind === 'error' ? 'text-rose-500' : 'text-emerald-500'} font-bold">${kind === 'error' ? '✕' : '✓'}</span><span>${msg}</span>`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; setTimeout(() => el.remove(), 320); }, 4200);
}

/* ============================================================
   DETAIL DRAWER
   ============================================================ */
function openDrawer(id) { state.drawerId = id; render(); }
function closeDrawer() { state.drawerId = null; render(); }

function renderDrawer() {
  const mount = document.getElementById('drawer-mount');
  const inv = state.invoices.find(i => i.id === state.drawerId);
  if (!inv) { mount.innerHTML = ''; return; }
  const total = invTotal(inv);
  mount.innerHTML = `
    <div class="fixed inset-0 z-40 bg-slate-900/40" onclick="closeDrawer()"></div>
    <aside class="drawer-in fixed right-0 top-0 bottom-0 z-50 w-full max-w-md bg-white shadow-2xl flex flex-col">
      <div class="px-6 py-5 border-b border-slate-200 flex items-start justify-between gap-3">
        <div class="min-w-0">
          <div class="flex items-center gap-2 flex-wrap">
            <h3 class="font-extrabold text-lg tnum">${inv.id}</h3>
            <span class="text-[11px] font-bold px-2 py-0.5 rounded-full ${STATUS_BADGE[inv.status]}">${STATUS_LABEL[inv.status]}</span>
          </div>
          <p class="text-sm font-semibold text-slate-700 mt-1 break-words">${inv.client}</p>
          <p class="text-xs text-slate-500 mt-0.5 break-words">${inv.project}</p>
        </div>
        <button onclick="closeDrawer()" class="text-slate-400 hover:text-slate-700 text-xl leading-none shrink-0">✕</button>
      </div>
      <div class="flex-1 overflow-y-auto px-6 py-5">
        <div class="grid grid-cols-3 gap-3 text-sm">
          <div><p class="text-xs text-slate-500 font-semibold uppercase tracking-wide">Issued</p><p class="mt-0.5 font-medium">${fmtDate(inv.issued)}</p></div>
          <div><p class="text-xs text-slate-500 font-semibold uppercase tracking-wide">Due</p><p class="mt-0.5 font-medium ${inv.status==='overdue' ? 'text-rose-600' : ''}">${fmtDate(inv.due)}</p></div>
          <div><p class="text-xs text-slate-500 font-semibold uppercase tracking-wide">Paid</p><p class="mt-0.5 font-medium">${fmtDate(inv.paidOn)}</p></div>
        </div>
        <h4 class="mt-6 mb-2 text-xs font-bold uppercase tracking-wider text-slate-500">Line items</h4>
        <div class="border border-slate-200 rounded-xl overflow-hidden">
          ${inv.items.map(it => `
            <div class="flex justify-between gap-3 px-4 py-3 border-b border-slate-100 last:border-0 text-sm">
              <div class="min-w-0">
                <p class="font-medium text-slate-800 break-words">${it.desc}</p>
                <p class="text-xs text-slate-500 tnum">${it.qty} × ${fmt.format(it.rate)}</p>
              </div>
              <p class="font-semibold tnum whitespace-nowrap">${fmt.format(it.qty * it.rate)}</p>
            </div>`).join('')}
          <div class="flex justify-between px-4 py-3 bg-slate-50 text-sm">
            <p class="font-bold">Total</p><p class="font-extrabold tnum">${fmt.format(total)}</p>
          </div>
        </div>
      </div>
      <div class="px-6 py-4 border-t border-slate-200 flex gap-2">
        ${inv.status === 'sent' || inv.status === 'overdue' ? `
          <button onclick="markPaid('${inv.id}')" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-bold py-2.5 rounded-lg">✓ Mark paid</button>
          <button onclick="sendReminder('${inv.id}')" class="flex-1 bg-white border border-slate-300 hover:bg-slate-50 text-sm font-semibold py-2.5 rounded-lg">Send reminder</button>` : ''}
        ${inv.status === 'draft' ? `
          <button onclick="sendDraft('${inv.id}')" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-bold py-2.5 rounded-lg">Send to client</button>` : ''}
        <button onclick="downloadPdf('${inv.id}')" class="bg-white border border-slate-300 hover:bg-slate-50 text-sm font-semibold py-2.5 px-3 rounded-lg" title="Triggers the demo error toast">PDF ↓</button>
      </div>
    </aside>`;
}

function sendDraft(id) {
  const inv = state.invoices.find(i => i.id === id);
  if (!inv) return;
  inv.status = 'sent';
  toast('success', `${inv.id} sent to ${inv.client}.`);
  render();
}

/* ============================================================
   NEW INVOICE MODAL
   ============================================================ */
let draftItems = [];

function openModal() {
  state.modalOpen = true;
  draftItems = [ { desc: '', qty: 1, rate: 0 } ];
  renderModal();
}
function closeModal() { state.modalOpen = false; renderModal(); }

function renderModal() {
  const mount = document.getElementById('modal-mount');
  if (!state.modalOpen) { mount.innerHTML = ''; return; }
  const total = draftItems.reduce((s, it) => s + (it.qty || 0) * (it.rate || 0), 0);
  mount.innerHTML = `
    <div class="fixed inset-0 z-40 bg-slate-900/50 flex items-center justify-center p-4" onclick="if(event.target===this)closeModal()">
      <div class="pop-in bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] flex flex-col">
        <div class="px-6 py-4 border-b border-slate-200 flex items-center justify-between">
          <h3 class="font-extrabold text-lg">New invoice <span class="text-slate-400 font-semibold tnum">INV-00${state.nextNumber}</span></h3>
          <button onclick="closeModal()" class="text-slate-400 hover:text-slate-700 text-xl leading-none">✕</button>
        </div>
        <div class="px-6 py-5 overflow-y-auto">
          <div class="grid grid-cols-2 gap-3">
            <div class="col-span-2">
              <label class="text-xs font-bold uppercase tracking-wide text-slate-500">Client</label>
              <input id="f-client" value="${(document.getElementById('f-client')||{}).value || ''}" placeholder="e.g. Juniper Skincare"
                class="mt-1 w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div class="col-span-2">
              <label class="text-xs font-bold uppercase tracking-wide text-slate-500">Project</label>
              <input id="f-project" value="${(document.getElementById('f-project')||{}).value || ''}" placeholder="e.g. Landing page design"
                class="mt-1 w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
              <label class="text-xs font-bold uppercase tracking-wide text-slate-500">Due date</label>
              <input id="f-due" type="date" value="${(document.getElementById('f-due')||{}).value || '2026-06-26'}"
                class="mt-1 w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
              <label class="text-xs font-bold uppercase tracking-wide text-slate-500">Save as</label>
              <select id="f-status" class="mt-1 w-full border border-slate-300 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500">
                <option value="sent">Send now</option>
                <option value="draft">Draft</option>
              </select>
            </div>
          </div>

          <h4 class="mt-5 mb-2 text-xs font-bold uppercase tracking-wider text-slate-500">Line items</h4>
          <div class="space-y-2">
            ${draftItems.map((it, i) => `
              <div class="flex gap-2 items-center">
                <input value="${it.desc}" oninput="draftItems[${i}].desc=this.value" placeholder="Description"
                  class="flex-1 border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                <input type="number" min="1" value="${it.qty}" oninput="draftItems[${i}].qty=+this.value; refreshDraftTotal()"
                  class="w-16 border border-slate-300 rounded-lg px-2 py-2 text-sm tnum text-center focus:outline-none focus:ring-2 focus:ring-indigo-500" title="Qty">
                <input type="number" min="0" step="50" value="${it.rate}" oninput="draftItems[${i}].rate=+this.value; refreshDraftTotal()"
                  class="w-24 border border-slate-300 rounded-lg px-2 py-2 text-sm tnum text-right focus:outline-none focus:ring-2 focus:ring-indigo-500" title="Rate ($)">
                <button onclick="removeDraftItem(${i})" class="text-slate-400 hover:text-rose-600 px-1 ${draftItems.length === 1 ? 'invisible' : ''}">✕</button>
              </div>`).join('')}
          </div>
          <button onclick="addDraftItem()" class="mt-2 text-sm font-semibold text-indigo-600 hover:text-indigo-800">＋ Add line item</button>

          <div class="mt-4 flex justify-between items-center bg-slate-50 border border-slate-200 rounded-xl px-4 py-3">
            <span class="text-sm font-bold">Total</span>
            <span id="draft-total" class="text-lg font-extrabold tnum">${fmt.format(total)}</span>
          </div>
        </div>
        <div class="px-6 py-4 border-t border-slate-200 flex justify-end gap-2">
          <button onclick="closeModal()" class="text-sm font-semibold px-4 py-2.5 rounded-lg border border-slate-300 hover:bg-slate-50">Cancel</button>
          <button onclick="saveInvoice()" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-bold px-5 py-2.5 rounded-lg">Create invoice</button>
        </div>
      </div>
    </div>`;
}

function refreshDraftTotal() {
  const total = draftItems.reduce((s, it) => s + (it.qty || 0) * (it.rate || 0), 0);
  const el = document.getElementById('draft-total');
  if (el) el.textContent = fmt.format(total);
}
function addDraftItem() { draftItems.push({ desc: '', qty: 1, rate: 0 }); renderModal(); }
function removeDraftItem(i) { draftItems.splice(i, 1); renderModal(); }

function saveInvoice() {
  const client = document.getElementById('f-client').value.trim();
  const project = document.getElementById('f-project').value.trim();
  const due = document.getElementById('f-due').value;
  const status = document.getElementById('f-status').value;
  if (!client) { toast('error', 'Client name is required.'); return; }
  const items = draftItems.filter(it => it.desc.trim() && it.qty > 0);
  if (items.length === 0) { toast('error', 'Add at least one line item with a description.'); return; }

  const inv = {
    id: 'INV-00' + state.nextNumber,
    client, project: project || 'Untitled project',
    status, issued: TODAY, due: due || '2026-06-26', paidOn: null, items,
  };
  state.nextNumber++;
  state.invoices.push(inv);
  state.modalOpen = false;
  toast('success', `${inv.id} created for ${client} — ${fmt.format(invTotal(inv))}${status === 'sent' ? ' and sent' : ' (draft)'}.`);
  renderModal();
  render();
}

/* ============================================================
   DEMO STATES PANEL
   ============================================================ */
function demoEmpty() {
  state.invoices = [];
  state.drawerId = null; state.filter = 'all';
  toast('success', 'Showing the empty state — what a brand-new account looks like.');
  render();
}
function demoLoading() {
  state.loading = true;
  render();
  setTimeout(() => { state.loading = false; render(); }, 1600);
}
function demoError() {
  toast('error', "Couldn't sync invoices — connection lost. Retrying in 30s (demo error).");
}
function demoOverflow() {
  if (!state.invoices.find(i => i.id === OVERFLOW_INVOICE.id)) {
    state.invoices.push(JSON.parse(JSON.stringify(OVERFLOW_INVOICE)));
  }
  state.filter = 'all';
  toast('success', 'Seeded INV-0099 — a monster client name, wall-of-text project and a $1.2B amount. Open it to see how the layout copes.');
  render();
}
function demoReset() {
  state = { invoices: JSON.parse(JSON.stringify(SEED_INVOICES)), filter: 'all', drawerId: null, modalOpen: false, loading: false, nextNumber: 52 };
  renderModal();
  toast('success', 'Data reset to the seed set.');
  render();
}

render();
</script>
</body>
</html>
