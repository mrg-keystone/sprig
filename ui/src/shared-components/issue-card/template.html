<!-- issue-card — STATIC + PARAMETRIZED. @input `issue`. -->
<a
  class="icard"
  [attr.data-id]="issue.id"
  [href]="'/ui/issues/' + issue.id"
  [class]="{ icard: true, 'icard--urgent': issue.priority === 'urgent' }"
>
  <div class="icard__top">
    <code class="icard__id">{{ issue.id }}</code>
    <span class="pill" [attr.data-priority]="issue.priority">{{ issue.priority }}</span>
  </div>
  <h3 class="icard__title">{{ issue.title }}</h3>
  <div class="icard__tags">
    @for (tag of issue.tags; track tag.label) {
      <span class="chip" [attr.data-tone]="tag.tone">{{ tag.label }}</span>
    }
  </div>
  <footer class="icard__foot">
    <span>{{ issue.points }} pts</span>
    <span>{{ issue.assignees.length }} assigned</span>
  </footer>
</a>
