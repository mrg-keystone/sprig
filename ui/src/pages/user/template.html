<!-- user page — @inputs `profile` + `id`. -->
<section class="user">
  @if (profile; as p) {
    <h1>{{ p.user.name }}</h1>
    <p class="user__bio">{{ p.user.role }} · {{ p.user.bio }}</p>
    <h2>Assigned ({{ p.issues.length }})</h2>
    <ul class="user__issues">
      @for (issue of p.issues; track issue.id) {
        <li><a [href]="'/ui/issues/' + issue.id">{{ issue.id }} — {{ issue.title }}</a></li>
      } @empty {
        <li>Nothing assigned.</li>
      }
    </ul>
  } @else {
    <p class="user__missing">No user with id "{{ id }}".</p>
  }
</section>
