<!-- star-rating — ISLAND (trigger: visible). rating() is a signal; set(n) writes it. -->
<div class="rating" role="radiogroup" aria-label="Rate this issue">
  @for (n of stars; track n) {
    <button
      class="rating__star"
      type="button"
      (click)="set(n)"
      [class.rating__star--on]="n <= rating()"
    >★</button>
  }
  <span class="rating__label">{{ rating() }}/5</span>
</div>
